<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koleksi Buku — Perpustakaan Keliling</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .katalog-layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 2rem;
            align-items: start
        }

        .filter-sidebar {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            position: sticky;
            top: 84px
        }

        .filter-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 1.25rem;
            padding-bottom: .75rem;
            border-bottom: 1px solid var(--border)
        }

        .filter-group {
            margin-bottom: 1.5rem
        }

        .filter-group-title {
            font-size: .8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--gray);
            margin-bottom: .75rem
        }

        .filter-option {
            display: flex;
            align-items: center;
            gap: .5rem;
            padding: .4rem 0;
            font-size: .9rem;
            color: var(--dark-3)
        }

        .katalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem
        }

        .book-card {
            background: var(--white);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            cursor: pointer
        }

        .book-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-5px);
            border-color: var(--primary)
        }

        .book-cover {
            width: 100%;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            position: relative;
            color: rgba(0, 0, 0, .3)
        }

        .status-tag {
            position: absolute;
            top: .65rem;
            right: .65rem;
            font-size: .7rem;
            font-weight: 700;
            padding: .2rem .55rem;
            border-radius: 9999px
        }

        .book-body {
            padding: 1rem;
            flex: 1;
            display: flex;
            flex-direction: column
        }

        .book-title {
            font-size: .9rem;
            font-weight: 700;
            color: var(--dark);
            margin: .4rem 0 .25rem;
            line-height: 1.3
        }

        .book-author {
            font-size: .78rem;
            color: var(--gray);
            margin-bottom: .5rem
        }

        .book-actions {
            display: flex;
            gap: .4rem;
            margin-top: auto
        }

        .book-actions .btn {
            flex: 1;
            justify-content: center
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: .5rem;
            margin-top: 3rem;
            flex-wrap: wrap
        }

        .page-btn {
            width: 40px;
            height: 40px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--white);
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center
        }

        .page-btn:hover,
        .page-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff
        }

        @media(max-width:900px) {
            .katalog-layout {
                grid-template-columns: 1fr
            }

            .filter-sidebar {
                position: static
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="navbar-brand">
                <div class="brand-icon"><i class="fas fa-book-open"></i></div><span>PerpusKeliling</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Beranda</a></li>
                <li><a href="koleksi.html" class="active">Koleksi Buku</a></li>
                <li><a href="jadwal.html">Jadwal &amp; Rute</a></li>
                <li><a href="layanan.html">Layanan</a></li>
                <li><a href="kontak.html">Kontak</a></li>
            </ul>
            <button class="hamburger" id="hamburger" aria-label="Menu"><i class="fas fa-bars"></i></button>
        </div>
    </nav>

    <section class="page-hero">
        <div class="container">
            <h1>Koleksi Buku</h1>
            <p>Jelajahi ribuan judul dari berbagai kategori.</p>
            <div class="search-bar" style="margin-top:1.75rem;"><input type="search" id="searchInput"
                    class="form-control" placeholder="Cari judul atau penulis..."><button class="btn btn-secondary"
                    id="searchBtn"><i class="fas fa-search"></i> Cari</button></div>
        </div>
    </section>

    <section class="section" style="background:var(--bg);">
        <div class="container">
            <div class="katalog-layout">
                <aside class="filter-sidebar">
                    <h2 class="filter-title"><i class="fas fa-filter"></i> Filter</h2>
                    <div class="filter-group">
                        <p class="filter-group-title">Kategori</p>
                        <label class="filter-option"><input type="checkbox" class="filter-kategori" value="Fiksi"
                                checked> Fiksi</label>
                        <label class="filter-option"><input type="checkbox" class="filter-kategori" value="Non-Fiksi"
                                checked> Non-Fiksi</label>
                        <label class="filter-option"><input type="checkbox" class="filter-kategori" value="Sains"
                                checked> Sains &amp; Teknologi</label>
                    </div>
                    <div class="filter-group">
                        <p class="filter-group-title">Status</p>
                        <label class="filter-option"><input type="checkbox" class="filter-status" value="Tersedia"
                                checked> Tersedia</label>
                        <label class="filter-option"><input type="checkbox" class="filter-status" value="Dipinjam"
                                checked> Sedang Dipinjam</label>
                    </div>
                    <button class="btn btn-outline" id="resetFilter" style="width:100%;justify-content:center;"><i
                            class="fas fa-redo"></i> Reset Filter</button>
                </aside>

                <main>
                    <div style="display:flex;justify-content:space-between;margin-bottom:1.5rem">
                        <p id="resultCount">Menampilkan <strong>0</strong> buku</p>
                        <select id="sortSelect" class="form-control" style="width:auto;padding:.45rem .85rem;">
                            <option value="default">Default</option>
                            <option value="judul">Judul A-Z</option>
                        </select>
                    </div>
                    <div class="katalog-grid" id="bookGrid"></div>
                    <div class="pagination" id="pagination"></div>
                </main>
            </div>
        </div>
    </section>

    <div class="modal-overlay" id="bookModal">
        <div class="modal-box">
            <div class="modal-header">
                <h2 id="modalBookTitle">Detail Buku</h2><button class="modal-close"
                    onclick="toggleModal('bookModal', false)"><i class="fas fa-times"></i></button>
            </div>
            <div id="modalBookContent"></div>
            <div style="display:flex;gap:.75rem;margin-top:1.5rem;">
                <button class="btn btn-primary" id="modalPinjamBtn" style="flex:1" onclick="pinjamBuku()"><i
                        class="fas fa-book-reader"></i> Pinjam Buku Ini</button>
                <button class="btn btn-outline" onclick="toggleModal('bookModal', false)">Tutup</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2025 PerpusKeliling.</p>
            </div>
        </div>
    </footer>

    <script src="main.js"></script>
    <script>
        var BUKU_DATA = [
            { id: 1, judul: "Laskar Pelangi", penulis: "Andrea Hirata", kategori: "Fiksi", status: "Tersedia", rating: 4.9, tahun: 2005, warna: "#DBEAFE", icon: "fa-book", isbn: "978-979-1341-00-1", deskripsi: "Novel pendidikan." },
            { id: 2, judul: "Bumi Manusia", penulis: "Pramoedya A. T", kategori: "Fiksi", status: "Tersedia", rating: 4.8, tahun: 1980, warna: "#D1FAE5", icon: "fa-book", isbn: "978-979-407-059-3", deskripsi: "Perjuangan pemuda." },
            { id: 3, judul: "Sapiens", penulis: "Yuval Noah Harari", kategori: "Non-Fiksi", status: "Tersedia", rating: 4.8, tahun: 2011, warna: "#E0F2FE", icon: "fa-landmark", isbn: "978-0-06-231609-7", deskripsi: "Sejarah umat manusia." },
            { id: 4, judul: "Brief History of Time", penulis: "Stephen Hawking", kategori: "Sains", status: "Dipinjam", rating: 4.7, tahun: 1988, warna: "#E0E7FF", icon: "fa-flask", isbn: "978-0-553-38016-3", deskripsi: "Ilmu fisika modern." }
        ];
        var state = { query: '', kategori: ['Fiksi', 'Non-Fiksi', 'Sains'], status: ['Tersedia', 'Dipinjam'], sort: 'default', page: 1, perPage: 12, selected: null };

        function renderGrid() {
            let filtered = BUKU_DATA.filter(b => (b.judul.toLowerCase().includes(state.query.toLowerCase()) || b.penulis.toLowerCase().includes(state.query.toLowerCase())) && state.kategori.includes(b.kategori) && state.status.includes(b.status));
            if (state.sort === 'judul') filtered.sort((a, b) => a.judul.localeCompare(b.judul));

            let grid = document.getElementById('bookGrid'), total = filtered.length;
            document.getElementById('resultCount').innerHTML = `Menampilkan <strong>${total}</strong> buku`;
            grid.innerHTML = filtered.map(b => `<article class="book-card" onclick="openBookModal(${b.id})"><div class="book-cover" style="background:${b.warna};"><i class="fas ${b.icon} fa-2x"></i><span class="status-tag ${b.status === 'Tersedia' ? 'badge-green' : 'badge-red'}">${b.status}</span></div><div class="book-body"><span class="badge badge-blue">${b.kategori}</span><p class="book-title">${b.judul}</p><p class="book-author">${b.penulis}</p><div class="book-actions"><button class="btn btn-primary btn-sm" ${b.status === 'Dipinjam' ? 'disabled' : ''}><i class="fas fa-book-reader"></i> Pinjam</button></div></div></article>`).join('');
        }

        function openBookModal(id) {
            let b = BUKU_DATA.find(x => x.id === id); if (!b) return;
            state.selected = id; document.getElementById('modalBookTitle').textContent = b.judul;
            document.getElementById('modalBookContent').innerHTML = `<p>${b.deskripsi}</p><p class="badge badge-blue mt-1">${b.status}</p>`;
            document.getElementById('modalPinjamBtn').disabled = (b.status === 'Dipinjam');
            toggleModal('bookModal', true);
        }

        function pinjamBuku() {
            let b = BUKU_DATA.find(x => x.id === state.selected);
            if (b && b.status === 'Tersedia') { b.status = 'Dipinjam'; renderGrid(); toggleModal('bookModal', false); showToast('Buku berhasil dipinjam', 'success'); }
        }

        document.getElementById('searchInput').addEventListener('input', e => { state.query = e.target.value; renderGrid(); });
        document.querySelectorAll('.filter-kategori, .filter-status').forEach(cb => cb.addEventListener('change', () => {
            state.kategori = Array.from(document.querySelectorAll('.filter-kategori:checked')).map(n => n.value);
            state.status = Array.from(document.querySelectorAll('.filter-status:checked')).map(n => n.value);
            renderGrid();
        }));

        renderGrid();
    </script>
</body>

</html>
